services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: fcg-claude-backend
    container_name: fcg-claude-backend
    restart: unless-stopped
    ports:
      - "8040:8040"
    environment:
      NODE_ENV: production
      PORT: 8040
      BODY_SIZE_LIMIT_MB: 2
      MAX_GENERATION_MS: 15000
      MAX_CANVAS_MEMORY_BYTES: 134217728
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 60
      CORS_ORIGIN: http://localhost:3040,http://127.0.0.1:3040,http://host.docker.internal:3040
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:8040/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 15s
      timeout: 3s
      start_period: 8s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: fcg-claude-frontend
    container_name: fcg-claude-frontend
    restart: unless-stopped
    ports:
      - "3040:3040"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3040/ || exit 1"]
      interval: 15s
      timeout: 3s
      start_period: 5s
      retries: 3
