services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fcg-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      CORS_ORIGINS: "http://localhost:3000,http://host.docker.internal:3000"
      BODY_SIZE_LIMIT_MB: "2"
      MAX_GENERATION_MS: "15000"
      LOG_LEVEL: info
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fcg-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fcg-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - fcg-net

networks:
  fcg-net:
    driver: bridge
