services:
  backend:
    build:
      context: ./backend
    container_name: fcg-codex-backend
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - BODY_SIZE_LIMIT_MB=2
      - MAX_GENERATION_MS=15000
      - MAX_CANVAS_MEMORY_BYTES=134217728
      - RATE_LIMIT_WINDOW_MS=60000
      - RATE_LIMIT_MAX=60
      - NODE_ENV=production
      - CORS_ORIGINS=http://localhost:3035

  frontend:
    build:
      context: ./frontend
    container_name: fcg-codex-frontend
    ports:
      - "3035:3035"
    depends_on:
      - backend
